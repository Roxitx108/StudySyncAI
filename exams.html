<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySyncAI | Exam Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container navbar">
        <a class="brand" href="index.html">
          <span class="brand-badge"><i class="fa-solid fa-graduation-cap"></i></span>
          <span>StudySyncAI</span>
        </a>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="assignments.html">Assignments</a>
          <a class="active" href="exams.html">Exams</a>
          <a href="calendar.html">Calendar</a>
          <a href="assistant.html">AI Study Coach</a>
          <a href="analytics.html">Analytics</a>
          <a href="resources.html">Resources</a>
          <a href="profile.html">Profile</a>
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle ripple" id="themeToggle" type="button"><i class="fa-solid fa-moon"></i> Dark Mode</button>
          <a class="btn btn-outline" href="profile.html">Profile</a>
          <a class="btn btn-primary ripple" href="exams.html">Add Exam</a>
        </div>
      </div>
    </header>

    <main class="container page-shell">
      <section class="section-heading">
        <div>
          <p class="badge"><i class="fa-solid fa-file-pen"></i> Exam Planner</p>
          <h2>Organize revision with timeline-based planning</h2>
        </div>
        <button id="examAddButton" class="btn btn-primary ripple"><i class="fa-solid fa-plus"></i> Add Exam</button>
      </section>

      <section id="examsList" class="grid-2"></section>

      <div id="examModal" class="modal-backdrop">
        <div class="modal-card">
          <h3 id="examModalTitle">Add Exam</h3>
          <form id="examForm">
            <div class="form-grid">
              <div class="form-field">
                <label>Subject</label>
                <input name="subject" type="text" required />
              </div>
              <div class="form-field">
                <label>Exam Date</label>
                <input name="examDate" type="date" required />
              </div>
              <div class="form-field">
                <label>Difficulty</label>
                <select name="difficulty">
                  <option>★★★★★</option>
                  <option>★★★★☆</option>
                  <option>★★★☆☆</option>
                  <option>★★☆☆☆</option>
                  <option>★☆☆☆☆</option>
                </select>
              </div>
              <div class="form-field">
                <label>Confidence %</label>
                <input name="confidence" type="number" min="0" max="100" value="60" required />
              </div>
              <div class="form-field">
                <label>Estimated Revision Hours</label>
                <input name="hours" type="number" min="1" max="40" value="10" required />
              </div>
              <div class="form-field full">
                <label>Notes</label>
                <textarea name="notes" required></textarea>
              </div>
              <div class="form-field full">
                <label>Topics Covered</label>
                <input name="topics" type="text" placeholder="TCP/IP, Subnetting, Routing" required />
              </div>
            </div>
            <div class="modal-actions">
              <button type="button" id="examCancel" class="btn btn-outline ripple">Cancel</button>
              <button type="submit" class="btn btn-primary ripple">Save Exam</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="footer container">
      <p>StudySync AI • Intelligent exam preparation planning.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
